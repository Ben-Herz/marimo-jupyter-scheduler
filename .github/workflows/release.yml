name: Release

on:
  push:
    branches:
      - release

jobs:
  test-build-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build tools
        run: pip install jupyterlab hatch hatch-nodejs-version build

      - name: Install Node dependencies and build frontend
        run: jlpm install && jlpm run build:prod

      - name: Install Python dependencies
        # labextension already exists from build:prod, so hatch skip-if-exists fires
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Build distribution packages
        run: python -m build

      - name: Verify wheel contents
        run: |
          pip install check-wheel-contents
          check-wheel-contents dist/*.whl
          unzip -l dist/*.whl | grep labextension

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
